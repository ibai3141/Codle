databaseChangeLog:
  - changeSet:
      id: 007-actualizar-tipado-y-lenguaje
      author: ibai
      preConditions:
        - onFail: HALT
        - onError: HALT
        - sqlCheck:
            expectedResult: 0
            sql: SELECT COUNT(*) FROM lenguaje
      changes:
        - createTable:
            tableName: tipado_tiempo
            columns:
              - column:
                  name: id
                  type: SMALLSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false

        - createTable:
            tableName: fortaleza_tipado
            columns:
              - column:
                  name: id
                  type: SMALLSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: nombre
                  type: VARCHAR(50)
                  constraints:
                    unique: true
                    nullable: false

        - insert:
            tableName: tipado_tiempo
            columns:
              - column: {name: nombre, value: "Estatico"}
        - insert:
            tableName: tipado_tiempo
            columns:
              - column: {name: nombre, value: "Dinamico"}

        - insert:
            tableName: fortaleza_tipado
            columns:
              - column: {name: nombre, value: "Fuerte"}
        - insert:
            tableName: fortaleza_tipado
            columns:
              - column: {name: nombre, value: "Debil"}

        - addColumn:
            tableName: lenguaje
            columns:
              - column:
                  name: tipado_tiempo_id
                  type: SMALLINT
              - column:
                  name: fortaleza_tipado_id
                  type: SMALLINT
              - column:
                  name: descripcion
                  type: VARCHAR(500)
              - column:
                  name: activo
                  type: BOOLEAN
                  defaultValueBoolean: true
              - column:
                  name: logo_path
                  type: VARCHAR(255)

        - dropForeignKeyConstraint:
            baseTableName: lenguaje
            constraintName: fk_lenguaje_tipado

        - dropIndex:
            indexName: idx_lenguaje_tipado
            tableName: lenguaje

        - dropColumn:
            tableName: lenguaje
            columnName: tipado_id

        - addNotNullConstraint:
            tableName: lenguaje
            columnName: tipado_tiempo_id
            columnDataType: SMALLINT

        - addNotNullConstraint:
            tableName: lenguaje
            columnName: fortaleza_tipado_id
            columnDataType: SMALLINT

        - addNotNullConstraint:
            tableName: lenguaje
            columnName: activo
            columnDataType: BOOLEAN

        - addForeignKeyConstraint:
            constraintName: fk_lenguaje_tipado_tiempo
            baseTableName: lenguaje
            baseColumnNames: tipado_tiempo_id
            referencedTableName: tipado_tiempo
            referencedColumnNames: id
            onDelete: RESTRICT

        - addForeignKeyConstraint:
            constraintName: fk_lenguaje_fortaleza_tipado
            baseTableName: lenguaje
            baseColumnNames: fortaleza_tipado_id
            referencedTableName: fortaleza_tipado
            referencedColumnNames: id
            onDelete: RESTRICT

        - createIndex:
            indexName: idx_lenguaje_tipado_tiempo
            tableName: lenguaje
            columns:
              - column: {name: tipado_tiempo_id}

        - createIndex:
            indexName: idx_lenguaje_fortaleza_tipado
            tableName: lenguaje
            columns:
              - column: {name: fortaleza_tipado_id}

        - dropTable:
            tableName: tipado
